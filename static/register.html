<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Flow2API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slide-up{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        .animate-slide-up{animation:slide-up .3s ease-out}
    </style>
    <script>
        tailwind.config={theme:{extend:{colors:{border:"hsl(0 0% 89%)",input:"hsl(0 0% 89%)",ring:"hsl(0 0% 3.9%)",background:"hsl(0 0% 100%)",foreground:"hsl(0 0% 3.9%)",primary:{DEFAULT:"hsl(0 0% 9%)",foreground:"hsl(0 0% 98%)"},secondary:{DEFAULT:"hsl(0 0% 96.1%)",foreground:"hsl(0 0% 9%)"},muted:{DEFAULT:"hsl(0 0% 96.1%)",foreground:"hsl(0 0% 45.1%)"},destructive:{DEFAULT:"hsl(0 84.2% 60.2%)",foreground:"hsl(0 0% 98%)"}}}}}
    </script>
</head>
<body class="h-full bg-background text-foreground antialiased">
    <div class="flex min-h-full flex-col justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-md">
            <div class="text-center">
                <h1 class="text-4xl font-bold">Flow2API</h1>
                <p class="mt-2 text-sm text-muted-foreground">Đăng ký tài khoản người dùng</p>
            </div>
        </div>

        <div class="sm:mx-auto sm:w-full sm:max-w-md mt-6">
            <div class="bg-background py-8 px-4 sm:px-10 rounded-lg border border-border shadow-sm">
                <form id="registerForm" class="space-y-6">
                    <div class="space-y-2">
                        <label for="username" class="text-sm font-medium">Tài khoản</label>
                        <input type="text" id="username" name="username" required class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:opacity-50" placeholder="Nhập tài khoản muốn tạo">
                    </div>
                    <div class="space-y-2">
                        <label for="password" class="text-sm font-medium">Mật khẩu</label>
                        <input type="password" id="password" name="password" required minlength="4" class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:opacity-50" placeholder="Nhập mật khẩu (ít nhất 4 ký tự)">
                    </div>
                    <button type="submit" id="registerButton" class="inline-flex items-center justify-center rounded-md font-medium transition-colors bg-primary text-primary-foreground hover:bg-primary/90 h-10 w-full disabled:opacity-50">Đăng ký ngay</button>
                </form>

                <div class="mt-6 text-center text-sm text-muted-foreground">
                    <p>Đã có tài khoản? <a href="/login" class="text-blue-600 hover:text-blue-800">Đăng nhập</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form=document.getElementById('registerForm'),btn=document.getElementById('registerButton');
        form.addEventListener('submit',async(e)=>{
            e.preventDefault();
            btn.disabled=true;
            btn.textContent='Đang xử lý...';
            try{
                const fd=new FormData(form);
                const r=await fetch('/api/auth/register',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({username:fd.get('username'),password:fd.get('password')})
                });
                const d=await r.json();
                if(r.ok) {
                    showToast('Đăng ký thành công! Vui lòng liên hệ Admin để cấp Key kích hoạt.', 'success');
                    setTimeout(() => location.href = '/login', 3000);
                } else {
                    showToast(d.detail || d.message || 'Đăng ký thất bại', 'error');
                }
            }catch(e){
                showToast('Lỗi mạng, vui lòng thử lại sau', 'error')
            }finally{
                btn.disabled=false;
                btn.textContent='Đăng ký ngay'
            }
        });
        function showToast(m,t='error'){
            const d=document.createElement('div'),bc={success:'bg-green-600',error:'bg-destructive',info:'bg-primary'};
            d.className=`fixed bottom-4 right-4 ${bc[t]||bc.error} text-white px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium z-50 animate-slide-up`;
            d.textContent=m;
            document.body.appendChild(d);
            setTimeout(()=>{
                d.style.opacity='0';
                d.style.transition='opacity .3s';
                setTimeout(()=>d.parentNode&&document.body.removeChild(d),300)
            },3000)
        }
    </script>
</body>
</html>
